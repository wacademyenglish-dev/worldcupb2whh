<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Homework App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#020617', panelDark: '#0F172A', panelHover: '#1E293B', textLight: '#F8FAFC', textMuted: '#94A3B8', accentViolet: '#8B5CF6', accentMint: '#10B981', dangerPink: '#F43F5E' },
                    fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        #phone-frame { width: 375px; height: 812px; background: #020617; border-radius: 40px; border: 12px solid #111; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(139,92,246,0.15); }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #111; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50; }
        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        /* Confetti */
        .confetti { position: absolute; width: 8px; height: 8px; background-color: #8B5CF6; opacity: 0; }
        @keyframes fall { 0% { opacity: 1; transform: translateY(-50px) rotate(0deg); } 100% { opacity: 0; transform: translateY(800px) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="phone-frame">
        <div class="notch"></div>
        
        <!-- UI Header -->
        <header class="pt-12 pb-4 px-6 bg-panelDark border-b border-panelHover flex justify-between items-center z-40 relative">
            <div class="font-heading font-bold text-accentViolet text-sm tracking-widest">WOLF<span class="text-textLight">HW</span></div>
            <div class="text-xs font-mono text-textMuted" id="q-counter">Q 1/15</div>
        </header>

        <!-- Progress Bar -->
        <div class="h-1 bg-bgDark w-full">
            <div id="progress-bar" class="h-full bg-accentViolet transition-all duration-300 shadow-[0_0_8px_rgba(139,92,246,0.5)]" style="width: 0%"></div>
        </div>

        <!-- Main Content -->
        <main id="app-content" class="p-6 h-[calc(100%-100px)] overflow-y-auto relative text-textLight">
            <!-- Start Screen -->
            <div id="screen-start" class="flex flex-col items-center justify-center h-full text-center fade-in">
                <i class="fa-solid fa-network-wired text-7xl text-accentViolet mb-6" style="text-shadow: 0 0 20px rgba(139,92,246,0.5);"></i>
                <h1 class="font-heading text-3xl font-black mb-2 uppercase tracking-widest">The Mind Palace</h1>
                <p class="text-textMuted mb-10 text-sm">Homework Module B2<br>Relative Clauses</p>
                <button onclick="startQuiz()" class="bg-accentViolet/20 text-accentViolet border border-accentViolet w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase text-lg shadow-lg hover:bg-accentViolet hover:text-white transition-colors">START LINK</button>
            </div>

            <!-- Quiz Screen -->
            <div id="screen-quiz" class="hidden flex-col h-full fade-in">
                <div class="flex-1 flex flex-col justify-center">
                    <p id="question-text" class="font-body text-2xl font-bold mb-8 text-center leading-snug"></p>
                    <div id="options-container" class="flex flex-col gap-4">
                        <!-- Options injected here -->
                    </div>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="screen-result" class="hidden flex-col items-center justify-center h-full text-center fade-in z-10 relative">
                <div id="rank-icon" class="text-7xl mb-4 text-accentViolet" style="text-shadow: 0 0 20px rgba(139,92,246,0.4);"></div>
                <h2 class="font-heading text-5xl font-black mb-2 text-textLight" id="final-score"></h2>
                <p class="text-textMuted font-mono mb-8 uppercase tracking-widest text-sm" id="rank-title"></p>
                <div class="bg-panelDark p-5 rounded-2xl w-full border border-panelHover mb-8 shadow-inner text-left">
                    <p class="text-sm text-textLight leading-relaxed"><span class="text-accentViolet font-bold">Defining:</span> Essential info, no commas. Can omit pron. if not subject.<br><span class="text-accentMint font-bold">Non-Defining:</span> Extra info, use commas. Never use "that".</p>
                </div>
                <button onclick="location.reload()" class="bg-panelHover border border-textMuted text-textMuted w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase">RESTART</button>
            </div>
        </main>
    </div>

    <script>
        const questions = [
            { q: "The man _____ is speaking has linguistic intelligence.", o: ["which", "who", "where"], a: 1 },
            { q: "This is the book _____ changed my life.", o: ["who", "whose", "that"], a: 2 },
            { q: "My brother, _____ is a genius, loves math.", o: ["that", "who", "which"], a: 1 },
            { q: "The company, _____ was founded in 2020, is very successful.", o: ["that", "which", "where"], a: 1 },
            { q: "She is the student _____ test score was the highest.", o: ["who", "whose", "that"], a: 1 },
            { q: "In which sentence can you OMIT the relative pronoun?", o: ["The person who helped me.", "The car that I bought.", "The dog which barked."], a: 1 },
            { q: "Can we use 'that' after a comma in a relative clause?", o: ["Yes, always", "Sometimes", "No, never"], a: 2 },
            { q: "The city _____ I was born is very small.", o: ["which", "that", "where"], a: 2 },
            { q: "People _____ pursue kinesthetic careers love sports.", o: ["which", "who", "whose"], a: 1 },
            { q: "Einstein, _____ theories changed science, was a genius.", o: ["whose", "who", "which"], a: 0 },
            { q: "Is this sentence correct? 'The phone, that I bought, is broken.'", o: ["Yes", "No", "Maybe"], a: 1 },
            { q: "The laptop _____ is on the desk is mine.", o: ["who", "where", "which"], a: 2 },
            { q: "I have a friend _____ speaks five languages.", o: ["that", "which", "whose"], a: 0 },
            { q: "In which sentence can you OMIT the relative pronoun?", o: ["The man who stole my bag.", "The job that I applied for.", "The artist who painted this."], a: 1 },
            { q: "Jim Kwik, _____ is a brain coach, wrote a great book.", o: ["that", "which", "who"], a: 2 }
        ];

        let currentQ = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('screen-quiz').style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQ) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-panelDark border border-panelHover text-left p-5 rounded-xl text-lg hover:border-accentViolet transition-colors';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx, q.a, btn, optsContainer);
                optsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, btn, container) {
            Array.from(container.children).forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('bg-accentViolet', 'border-accentViolet', 'text-white', 'font-bold');
                score++;
            } else {
                btn.classList.add('bg-dangerPink', 'border-dangerPink', 'text-white');
                container.children[correct].classList.add('border-accentViolet', 'text-accentViolet');
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    document.getElementById('screen-quiz').classList.remove('fade-in');
                    void document.getElementById('screen-quiz').offsetWidth; 
                    document.getElementById('screen-quiz').classList.add('fade-in');
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('screen-result').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '100%';
            
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let rank, icon;
            if (score === 15) { rank = 'COGNITIVE GENIUS'; icon = '<i class="fa-solid fa-brain"></i>'; spawnConfetti(); }
            else if (score >= 10) { rank = 'PROFICIENT LEARNER'; icon = '<i class="fa-solid fa-network-wired text-accentMint"></i>'; }
            else { rank = 'NEURAL BEGINNER'; icon = '<i class="fa-solid fa-user text-textMuted"></i>'; }
            
            document.getElementById('rank-title').innerText = rank;
            document.getElementById('rank-icon').innerHTML = icon;
        }

        function spawnConfetti() {
            const container = document.getElementById('screen-result');
            const colors = ['#8B5CF6', '#10B981', '#F8FAFC'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                conf.style.animationDelay = Math.random() * 2 + 's';
                conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                container.appendChild(conf);
            }
        }
    </script>
</body>
</html>
